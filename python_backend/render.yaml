# Render Blueprint — push python_backend/ as its own GitHub repo, then:
# Render Dashboard → New → Blueprint → connect repo → deploy
#
# Before first deploy: copy assets/models/*.pth and *.pt into python_backend/models/
# (~170 MB — must be committed to Git for Render).

services:
  - type: web
    name: cattle-ai-backend
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: bash render-build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MODELS_DIR
        value: models
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "*"
